<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Security Auditor Settings</title>
    <link rel="stylesheet" href="styles/options.css">
  </head>
  <body>
    <main class="settings-shell">
      <header class="settings-header">
        <p class="eyebrow">Security Auditor</p>
        <h1>Settings</h1>
      </header>

      <section class="settings-panel">
        <div class="setting-row">
          <div>
            <h2>AI summaries</h2>
            <p>When enabled, scan findings are sent to your selected AI provider for a short explanation.</p>
          </div>
          <label class="switch">
            <input id="aiEnabled" type="checkbox">
            <span></span>
          </label>
        </div>

        <label class="field">
          <span>Provider</span>
          <select id="provider">
            <option value="openai">OpenAI</option>
            <option value="gemini">Gemini</option>
          </select>
        </label>

        <label class="field">
          <span>Model</span>
          <input id="model" type="text" autocomplete="off" placeholder="gpt-4.1-mini">
        </label>

        <label class="field">
          <span>API key</span>
          <input id="apiKey" type="password" autocomplete="off" placeholder="Stored locally in Chrome">
        </label>

        <div class="actions">
          <button id="saveButton" class="primary-button" type="button">Save</button>
          <span id="status" role="status"></span>
        </div>
      </section>
    </main>
    <script src="src/options.js"></script>
  </body>
</html>
